const STORAGE_KEY = "saa-c03-chain-quiz-reverse-v1";
let state = loadState();
let current = null;
let previousId = null;
let answered = false;
let resetArmed = false;
const $ = (id) => document.getElementById(id);
function loadState(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{items:{},total:0,correct:0}}catch{return{items:{},total:0,correct:0}}}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function itemState(id){if(!state.items[id])state.items[id]={tries:0,correct:0,wrong:0,streak:0,bookmarked:false,lastAt:null};return state.items[id]}
function isMastered(item){return itemState(item.id).streak>=2}
function norm(value){return String(value||"").toLowerCase().replace(/[^\p{L}\p{N}]+/gu," ").replace(/\s+/g," ").trim()}
function compact(value){return norm(value).replace(/\s+/g,"")}
function answerMatches(item,input){const n=norm(input),c=compact(input);if(!n)return false;return item.acceptedKeywords.some(k=>{const nk=norm(k),ck=compact(k);return n===nk||c===ck||n.includes(nk)||nk.includes(n)||c.includes(ck)||ck.includes(c)})}
function matchesSearch(item,q){if(!q)return true;const n=norm(q);return [item.id,item.topic,item.axis,item.prompt,item.answerText,item.sourceLine].some(v=>norm(v).includes(n))}
function filteredItems(){const mode=$("modeSelect").value,topic=$("topicSelect").value,search=$("searchInput").value.trim();return ITEMS.filter(item=>{const st=itemState(item.id);if(topic&&item.topic!==topic)return false;if(!matchesSearch(item,search))return false;if(mode==="chain"&&item.axis!=="질문 사슬")return false;if(mode==="trap"&&item.axis!=="핵심 함정")return false;if(mode==="weak"&&isMastered(item))return false;if(mode==="weak"&&st.wrong===0&&st.tries>0&&st.streak>0)return false;if(mode==="bookmarked"&&!st.bookmarked)return false;return true})}
function nextPool(){return filteredItems().filter(item=>!isMastered(item))}
function chooseNext(forceRandom=false){const pool=nextPool();if(!pool.length){current=null;renderEmpty();renderStats();return}const untried=pool.filter(item=>itemState(item.id).tries===0);let source=!forceRandom&&untried.length?untried:pool;if(source.length>1&&previousId)source=source.filter(item=>item.id!==previousId);current=source[Math.floor(Math.random()*source.length)];previousId=current.id;answered=false;renderQuestion();renderStats()}
function renderQuestion(){const st=itemState(current.id);$("bookmarkBtn").textContent=st.bookmarked?"★":"☆";$("quiz").innerHTML=`<div class="meta"><span class="pill">역방향</span><span class="pill">${escapeHtml(current.topic)}</span><span class="pill">${escapeHtml(current.axis)}</span><span class="pill good">연속 정답 ${st.streak}/2</span></div><div class="promptLabel">답</div><p class="prompt">${escapeHtml(current.prompt)}</p><div class="axis">${escapeHtml(current.topic)} · ${escapeHtml(current.axis)}</div><input class="answerInput" id="answerInput" autocomplete="off" placeholder="원문 질문을 그대로 입력"><div class="controls"><button class="btn primary" id="submitBtn">정답 확인</button><button class="btn" id="showBtn">정답 보기</button></div><div id="feedbackHost"></div>`;$("answerInput").focus();$("answerInput").addEventListener("keydown",e=>{if(e.key==="Enter")submitAnswer()});$("submitBtn").addEventListener("click",submitAnswer);$("showBtn").addEventListener("click",showAnswer)}
function submitAnswer(){if(answered)return;const given=$("answerInput").value;const ok=answerMatches(current,given);recordAttempt(ok);showFeedback(ok,false)}
function showAnswer(){if(answered)return;recordAttempt(false);showFeedback(false,true)}
function recordAttempt(ok){const st=itemState(current.id);state.total+=1;st.tries+=1;st.lastAt=new Date().toISOString();if(ok){state.correct+=1;st.correct+=1;st.streak+=1}else{st.wrong+=1;st.streak=0}answered=true;saveState();renderStats()}
function showFeedback(ok,peek){const st=itemState(current.id);$("feedbackHost").innerHTML=`<div class="feedback ${peek?"peek":ok?"good":"bad"}"><h2>${peek?"정답 보기":ok?"정답":"오답"}</h2><p><b>정답:</b> ${escapeHtml(current.answerText)}</p><p><b>PDF 원문:</b> ${escapeHtml(current.sourceLine)}</p><p><b>연속 정답:</b> ${st.streak}/2${st.streak>=2?" · 다음부터 출제 제외":""}</p><div class="controls"><button class="btn primary" id="nextBtn">다음 문제</button></div></div>`;$("nextBtn").addEventListener("click",()=>chooseNext())}
function renderEmpty(){$("bookmarkBtn").textContent="☆";$("quiz").innerHTML=`<div class="empty"><h2>현재 필터에서 남은 문제가 없습니다.</h2><p>필터를 바꾸거나 기록을 리셋하면 다시 출제됩니다.</p></div>`}
function renderStats(){const mastered=ITEMS.filter(isMastered).length,left=filteredItems().filter(item=>!isMastered(item)).length,rate=state.total?Math.round(state.correct/state.total*100):0;$("totalItemsStat").textContent=ITEMS.length;$("leftStat").textContent=left;$("masteredStat").textContent=mastered;$("correctStat").textContent=rate+"%";const pct=Math.round(mastered/ITEMS.length*100);$("progressFill").style.width=pct+"%";$("progressText").textContent=`${ITEMS.length}개 중 ${mastered}개가 2회 연속 정답으로 제외됨`}
function setup(){const topics=[...new Set(ITEMS.map(i=>i.topic))].sort((a,b)=>Number((a.match(/^T(\\d+)/)||[0,99])[1])-Number((b.match(/^T(\\d+)/)||[0,99])[1]));$("topicSelect").innerHTML+=topics.map(t=>`<option value="${escapeAttr(t)}">${escapeHtml(t)}</option>`).join("");["modeSelect","topicSelect"].forEach(id=>$(id).addEventListener("change",()=>chooseNext(true)));$("searchInput").addEventListener("input",debounce(()=>chooseNext(true),250));$("skipBtn").addEventListener("click",()=>chooseNext(true));$("wrongOnlyBtn").addEventListener("click",()=>{$("modeSelect").value="weak";chooseNext(true)});$("resetBtn").addEventListener("click",()=>{if(!resetArmed){resetArmed=true;$("resetBtn").textContent="한 번 더 누르면 리셋";setTimeout(()=>{resetArmed=false;$("resetBtn").textContent="기록 리셋"},4000);return}resetArmed=false;$("resetBtn").textContent="기록 리셋";state={items:{},total:0,correct:0};saveState();chooseNext(true)});$("bookmarkBtn").addEventListener("click",()=>{if(!current)return;const st=itemState(current.id);st.bookmarked=!st.bookmarked;saveState();$("bookmarkBtn").textContent=st.bookmarked?"★":"☆";renderStats()})}
function escapeHtml(value){return String(value??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
function escapeAttr(value){return escapeHtml(value).replace(/`/g,"&#96;")}
function debounce(fn,wait){let timer;return(...args)=>{clearTimeout(timer);timer=setTimeout(()=>fn(...args),wait)}}
setup();chooseNext();
</script>
</body>
</html>
